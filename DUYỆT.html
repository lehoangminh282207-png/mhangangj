<input id="fiValue" placeholder="Fiber / 100g">

</div>

<!-- STEP 6 -->
<div id="step6" class="box hidden">
<h3>🔥 Kết quả 1 ngày</h3>
<div id="result" class="result"></div>
</div>

<script>
let macro = {};

function save(){
let w = parseFloat(weight.value);
let level = document.getElementById("level").value;

if(!w || !level) return alert("Nhập đủ nha 💖");

let P,C,F,Fi;

if(level=="light"){P=1.6*w;C=3.5*w;F=0.7*w;Fi=0.3*w;}
if(level=="medium"){P=1.8*w;C=4.5*w;F=0.8*w;Fi=0.35*w;}
if(level=="high"){P=2.2*w;C=5.5*w;F=1.0*w;Fi=0.4*w;}

macro = {P,C,F,Fi};

document.getElementById("macro").innerHTML = `
<p class="result">
Protein: ${P.toFixed(1)}g<br>
Carb: ${C.toFixed(1)}g<br>
Fat: ${F.toFixed(1)}g<br>
Fiber: ${Fi.toFixed(1)}g
</p>
`;

document.getElementById("step2").classList.remove("hidden");
}

function next(step){
document.getElementById("step"+step).classList.remove("hidden");
}

function calculate(){

let pGram = macro.P / (pValue.value/100);
let cGram = macro.C / (cValue.value/100);
let fGram = macro.F / (fValue.value/100);
let fiGram = macro.Fi / (fiValue.value/100);

document.getElementById("step6").classList.remove("hidden");

result.innerHTML = `
🍗 ${pName.value}: ${pGram.toFixed(0)}g
<br><br>🍚 ${cName.value}: ${cGram.toFixed(0)}g
<br><br>🥑 ${fName.value}: ${fGram.toFixed(0)}g
<br><br>🥬 ${fiName.value}: ${fiGram.toFixed(0)}g
<br><br>🌸 Tổng 1 ngày
`;
}
</script>

</body>
</html>
